<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>E-Procurement</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <section class="container-fluid forms">
        <div class="form login">
            <div class="form-content">
                <header>Login</header>
                <form action="#">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                        <label for="floatingInput">Email address</label>
                        <div class="invalid-feedback">
                            Please enter a valid email.
                        </div>
                    </div>
                    <div class="form-floating mb-2" id="password">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword">Password</label>
                        <i class="fa fa-eye-slash eye"></i>
                        <div class="invalid-feedback">
                            The password is not correct.
                        </div>
                    </div>
                    <div class="form-link mb-3">
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>
                    <div class="d-block mb-2" id="login-btn">
                        <button class="btn btn-primary">Login</button>
                    </div>
                    <div class="form-link mb-4">
                        <span>Don't have an account yet? <a href="#" class="forgot-pass">Sign Up</a> </span>
                    </div>
                </form>
            </div>
            <div class="line"></div>
            <div class="d-block mt-4" id="login-with-google">
                <button class="btn btn-primary">
                    <span><i class="fa fa-google"></i> Login with Google</span>
                </button>
            </div>
            <a href="index.html"> abc</a>
        </div>
    </section>
</body>
</html>
