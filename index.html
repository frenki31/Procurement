<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>E-Procurement</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar sticky-top navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="img-brand" href="#">
          <img src="img/handshake.png" alt="Logo" height="70px">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Search here..." aria-label="Search">
            <button class="btn btn-outline-primary" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>  
    <section id="home">
      <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active" data-bs-interval="10000">
            <img src="img/touch.jpg" class="d-block w-100" alt="...">
              <div class="text">
                <h1>Welcome to electronic tender</h1>
                <p>Procurement Made Simple</p>
              </div>
          </div>
          <div class="carousel-item" data-bs-interval="2000">
            <img src="img/tender.png" class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="img/meeting.png" class="d-block w-100" alt="...">
            <div class="text">
              <h1>Open Procurement process</h1>
              <p>Check Every Tender</p>
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </section>
    <section id="products">
      <div class="row row-cols-md-4 row-cols-sm-2 g-4 m-1">
        <div class="col-12">
          <div class="card border-primary text-center h-100">
            <img src="img/government.png" class="card-img-top" alt="...">
            <div class="card-body">
              <h5 class="card-title">Local Government Unit</h5>
              <a href="#" class="btn btn-outline-primary">READ MORE...</a>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="card border-primary text-center h-100">
            <img src="img/medicine.png" class="card-img-top" alt="...">
            <div class="card-body">
              <h5 class="card-title">Health Sector</h5>
              <a href="#" class="btn btn-outline-primary">READ MORE...</a>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="card border-primary text-center h-100">
            <img src="img/building.png" class="card-img-top" alt="...">
            <div class="card-body">
              <h5 class="card-title">Companies</h5>
              <a href="#" class="btn btn-outline-primary">READ MORE...</a>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="card border-primary text-center h-100">
            <img src="img/street.png" class="card-img-top" alt="...">
            <div class="card-body">
              <h5 class="card-title">Road Authority</h5>
              <a href="#" class="btn btn-outline-primary">READ MORE...</a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section id="contact">
      <div class="container-fluid mt-4">
        <h1>Contact Us</h1>
        <div class="row row-cols-md-2 row-cols-sm-1 g-2">
          <div class="col-12">
            <iframe class="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2995.4570798222667!2d19.843386014570672!3d41.342417806746205!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x135030fdf80c5831%3A0xf1c48c000dd8e503!2sCanadian%20Institute%20of%20Technology%20(%22Instituti%20Kanadez%20i%20Teknologjis%C3%AB%22)!5e0!3m2!1sen!2s!4v1673808465081!5m2!1sen!2s" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
          <form class="col-12" onsubmit="sendEmail(); reset(); return false;" id="message-form">
            <h1>Get in touch</h1>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="name" placeholder="Please enter your name" required>
              <label for="floatingInput">Name</label>
            </div>
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <label for="floatingInput">Email address</label>
            </div>
            <div class="mb-3">
              <textarea class="form-control" id="message" rows="4" placeholder="How can we help you?"></textarea>
            </div>
            <div class="submit-button d-grid">
              <button class="btn btn-outline-primary">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </section>
    <a class="to-top" href="#home">
      <i class="fas fa-chevron-up" aria-hidden="true"></i>
    </a>
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
